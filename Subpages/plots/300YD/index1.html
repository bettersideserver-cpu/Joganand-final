    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');
    .dock-wrap, #dock { display: none !important; visibility: hidden !important; opacity: 0 !important; pointer-events: none !important; height: 0 !important; overflow: hidden !important; position: absolute !important; }
    .ci-toggle { position: fixed; top: 24px; right: 24px; width: 36px; height: 36px; border-radius: 12px; background: rgba(15,15,18,0.42); backdrop-filter: blur(60px); border: 1px solid rgba(255,255,255,0.07); color: rgba(255,255,255,0.4); display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; }
    .ci-toggle.visible { display: flex; }
    .ci-toggle svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .close-btn { position: fixed !important; top: 24px !important; left: 24px !important; width: 36px !important; height: 36px !important; border-radius: 12px !important; background: rgba(15,15,18,0.42) !important; backdrop-filter: blur(60px) !important; border: 1px solid rgba(255,255,255,0.07) !important; color: rgba(255,255,255,0.45) !important; font-size: 15px !important; display: flex !important; align-items: center !important; justify-content: center !important; cursor: pointer !important; z-index: 9999 !important; box-shadow: 0 8px 24px rgba(0,0,0,0.2) !important; line-height: 1 !important; padding: 0 !important; }
  </style>
</head>

<body>

  <div class="ci-toggle" id="ciToggle" title="Room info">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
  </div>

  <div class="main-container">
    <div class="image-container"></div>
  </div>

  <button class="close-btn" id="closeCard">←</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/105/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/panolens@0.12.0/build/panolens.min.js"></script>

  <!-- ═══════════════════════════════════════════
       1. GOOGLE STREET-VIEW STYLE CHEVRON TEXTURE
  ═══════════════════════════════════════════ -->
  <script>
    function createArrowCanvas() {
      const W = 512;
      const canvas = document.createElement("canvas");
      canvas.width = W;
      canvas.height = W;
      const ctx = canvas.getContext("2d");
      const cx = W / 2, cy = W / 2;

      // Soft elliptical ground shadow
      const shadowGrad = ctx.createRadialGradient(cx, cy + 60, 5, cx, cy + 60, 230);
      shadowGrad.addColorStop(0, "rgba(0,0,0,0.55)");
      shadowGrad.addColorStop(0.5, "rgba(0,0,0,0.20)");
      shadowGrad.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = shadowGrad;
      ctx.beginPath();
      ctx.ellipse(cx, cy + 60, 230, 95, 0, 0, Math.PI * 2);
      ctx.fill();

      // Thick rounded white chevron
      ctx.save();
      ctx.translate(cx, cy);
      ctx.shadowColor = "rgba(0,0,0,0.45)";
      ctx.shadowBlur = 22;
      ctx.shadowOffsetY = 8;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.lineWidth = 60;
      ctx.strokeStyle = "rgba(255,255,255,0.97)";
      ctx.beginPath();
      ctx.moveTo(-115, 50);
      ctx.lineTo(0, -100);
      ctx.lineTo(115, 50);
      ctx.stroke();

      // Inner highlight
      ctx.shadowColor = "transparent";
      ctx.lineWidth = 18;
      ctx.strokeStyle = "rgba(255,255,255,0.55)";
      ctx.beginPath();
      ctx.moveTo(-95, 30);
      ctx.lineTo(0, -80);
      ctx.lineTo(95, 30);
      ctx.stroke();
      ctx.restore();

      return canvas;
    }
    function createArrowSVG() { return createArrowCanvas().toDataURL("image/png"); }
  </script>

  <!-- ═══════════════════════════════════════════
       2. PANORAMA VIEWER (your original setup)
  ═══════════════════════════════════════════ -->
  <script>
    const LOW_SRC = "images/1_.webp";
    const HIGH_SRC = "images/1.jpg";
    const imageContainer = document.querySelector(".image-container");

    const panoLow = new PANOLENS.ImagePanorama(LOW_SRC);
    const panoHigh = new PANOLENS.ImagePanorama(HIGH_SRC);

    const viewer = new PANOLENS.Viewer({
      container: imageContainer, autoRotate: false, autoRotateSpeed: 0.1,
      controlBar: false, cameraFov: 80
    });

    let didInitView = false;
    const TEXTURE_YAW = -Math.PI / 2 + 0;
    panoLow.rotation.y = TEXTURE_YAW;
    panoHigh.rotation.y = TEXTURE_YAW;

    function setInitialViewAndLockPitch() {
      if (didInitView) return;
      didInitView = true;
      const controls = viewer.getControl();
      controls.rotateUp(-(-Math.PI / 40));
      if ('minPolarAngle' in controls && 'maxPolarAngle' in controls) {
        controls.minPolarAngle = 0; controls.maxPolarAngle = Math.PI;
      }
      if ('enablePan' in controls) controls.enablePan = false;
    }

    panoLow.addEventListener('enter', setInitialViewAndLockPitch);
    panoHigh.addEventListener('enter', setInitialViewAndLockPitch);
    viewer.add(panoLow); viewer.add(panoHigh); viewer.setPanorama(panoLow);

    function degToRad(deg) { return deg * Math.PI / 180; }

    panoLow.addEventListener("load", () => {
      panoHigh.addEventListener("load", () => { viewer.setPanorama(panoHigh, 600); });
      panoHigh.load();
    });
    panoHigh.addEventListener("error", (e) => { console.warn("Failed to load high-res:", e); });
  </script>

  <!-- ═══════════════════════════════════════════
       3. FLAT-ON-GROUND HOTSPOT SYSTEM (FIXED)
       
       Fixes from previous version:
        ✓ Uses CanvasTexture — no async image loading
        ✓ Adds to viewer.scene — visible during low→high res swap
        ✓ Created and added immediately — no 'load' event dependency
  ═══════════════════════════════════════════ -->
  <script>
    const groundHotspots = [];

    /**
     * @param yawDeg    Same yaw convention as your old Infospot/setFromAngles
     * @param pitchDeg  Negative number, e.g. -28 puts it on the floor
     * @param onClick   Callback fired on tap
     * @param opts      { distance: 4500, size: 800 }
     */
    function createGroundHotspot(yawDeg, pitchDeg, onClick, opts = {}) {
      const distance = opts.distance || 4500;
      const size = opts.size || 800;

      // CanvasTexture: synchronous, reliable
      const tex = new THREE.CanvasTexture(createArrowCanvas());
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      tex.needsUpdate = true;

      const geom = new THREE.PlaneGeometry(size, size);
      const mat = new THREE.MeshBasicMaterial({
        map: tex, transparent: true, depthWrite: false, depthTest: false, side: THREE.DoubleSide
      });

      const mesh = new THREE.Mesh(geom, mat);
      mesh.rotation.x = -Math.PI / 2;
      mesh.renderOrder = 999;

      const container = new THREE.Group();
      container.add(mesh);

      // Position — we add TEXTURE_YAW so yaw values match your existing
      // Infospot convention exactly (you can reuse the same yaw numbers).
      const yaw = degToRad(yawDeg) + TEXTURE_YAW;
      const pitch = degToRad(pitchDeg);
      container.position.set(
        distance * Math.cos(pitch) * Math.sin(yaw),
        distance * Math.sin(pitch),
        distance * Math.cos(pitch) * Math.cos(yaw)
      );
      container.rotation.y = yaw;

      mesh.userData.isGroundHotspot = true;
      mesh.userData.onClick = onClick;
      mesh.userData.targetScale = 1;
      mesh.userData.currentScale = 1;
      mesh.userData.container = container;

      groundHotspots.push(mesh);
      return container;
    }

    // Raycasting — hover scale + click
    const _raycaster = new THREE.Raycaster();
    const _mouse = new THREE.Vector2();
    let _hovered = null;

    function _updateMouse(e) {
      const rect = imageContainer.getBoundingClientRect();
      const cx = (e.touches && e.touches[0] ? e.touches[0].clientX : e.clientX);
      const cy = (e.touches && e.touches[0] ? e.touches[0].clientY : e.clientY);
      _mouse.x = ((cx - rect.left) / rect.width) * 2 - 1;
      _mouse.y = -((cy - rect.top) / rect.height) * 2 + 1;
    }

    function _intersectHotspots() {
      _raycaster.setFromCamera(_mouse, viewer.getCamera());
      return _raycaster.intersectObjects(groundHotspots, false);
    }

    imageContainer.addEventListener('pointermove', (e) => {
      _updateMouse(e);
      const next = (() => { const h = _intersectHotspots(); return h.length ? h[0].object : null; })();
      if (next !== _hovered) {
        if (_hovered) _hovered.userData.targetScale = 1;
        if (next) next.userData.targetScale = 1.28;
        _hovered = next;
        imageContainer.style.cursor = next ? 'pointer' : 'grab';
      }
    });

    imageContainer.addEventListener('click', (e) => {
      _updateMouse(e);
      const h = _intersectHotspots();
      if (h.length) { const cb = h[0].object.userData.onClick; if (typeof cb === 'function') cb(); }
    });

    (function animate() {
      groundHotspots.forEach(h => {
        const t = h.userData.targetScale, c = h.userData.currentScale;
        const next = c + (t - c) * 0.18;
        h.userData.currentScale = next;
        h.userData.container.scale.set(next, next, next);
      });
      requestAnimationFrame(animate);
    })();
  </script>

  <!-- ═══════════════════════════════════════════
       4. ADD YOUR HOTSPOTS HERE
  ═══════════════════════════════════════════ -->
  <script>
    // Test arrows — adjust yaw/pitch and onClick targets to your scene.
    const hsForward = createGroundHotspot(0, -30, () => {
      console.log("Forward arrow clicked");
      // window.location.href = "../next-room/index.html";
    });
    viewer.scene.add(hsForward);

    const hsRight = createGroundHotspot(45, -30, () => {
      console.log("Right arrow clicked");
    });
    viewer.scene.add(hsRight);

    console.log("[hotspots] registered:", groundHotspots.length);
  </script>

  <!-- Card toggle / back button -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const widget = document.getElementById("ciWidget");
      const toggle = document.getElementById("ciToggle");
      const ciClose = document.getElementById("ciClose");
      if (ciClose) ciClose.addEventListener("click", (e) => { e.stopPropagation(); widget.classList.add("collapsed"); toggle.classList.add("visible"); });
      if (toggle) toggle.addEventListener("click", () => { widget.classList.remove("collapsed"); toggle.classList.remove("visible"); });
      const closeCard = document.getElementById("closeCard");
      if (closeCard) closeCard.addEventListener("click", () => {
        if (window.history.length > 1 && document.referrer) window.history.back();
        else window.location.href = "../../../index.html";
      });
      if (widget) ['mousedown','mouseup','click','pointerdown','pointerup','touchstart','touchend'].forEach(evt =>
        widget.addEventListener(evt, e => e.stopPropagation()));
    });
  </script>
