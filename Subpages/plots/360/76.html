  <script>
    function createArrowSVG() {
      const size = 256; const canvas = document.createElement("canvas"); canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext("2d"); const cx = size / 2, cy = size / 2, outerR = 88, innerRingR = 76, dotR = 30;
      ctx.save(); ctx.shadowColor = "rgba(0, 0, 0, 0.45)"; ctx.shadowBlur = 24; ctx.shadowOffsetY = 6;
      ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI * 2); ctx.fillStyle = "rgba(0,0,0,0.001)"; ctx.fill(); ctx.restore();
      ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI * 2); ctx.fillStyle = "rgba(255, 255, 255, 0.08)"; ctx.fill();
      const glassGrad = ctx.createRadialGradient(cx, cy - 20, 10, cx, cy, outerR);
      glassGrad.addColorStop(0, "rgba(255, 255, 255, 0.28)"); glassGrad.addColorStop(0.55, "rgba(255, 255, 255, 0.10)"); glassGrad.addColorStop(1, "rgba(255, 255, 255, 0.03)");
      ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI * 2); ctx.fillStyle = glassGrad; ctx.fill();
      const gloss = ctx.createLinearGradient(cx, cy - outerR, cx, cy);
      gloss.addColorStop(0, "rgba(255, 255, 255, 0.35)"); gloss.addColorStop(1, "rgba(255, 255, 255, 0)");
      ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI * 2); ctx.fillStyle = gloss; ctx.fill();
      ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI * 2); ctx.strokeStyle = "rgba(255, 255, 255, 0.22)"; ctx.lineWidth = 2; ctx.stroke();
      ctx.beginPath(); ctx.arc(cx, cy, innerRingR, 0, Math.PI * 2); ctx.strokeStyle = "rgba(255, 255, 255, 0.08)"; ctx.lineWidth = 1.5; ctx.stroke();
      const dotGrad = ctx.createRadialGradient(cx - 2, cy - 3, 1, cx, cy, dotR);
      dotGrad.addColorStop(0, "#123a8a"); dotGrad.addColorStop(1, "#0A1F44");
      ctx.beginPath(); ctx.arc(cx, cy, dotR, 0, Math.PI * 2); ctx.fillStyle = dotGrad; ctx.fill();
      ctx.beginPath(); ctx.arc(cx - 3.5, cy - 4, 3, 0, Math.PI * 2); ctx.fillStyle = "rgba(255, 255, 255, 0.55)"; ctx.fill();
      return canvas.toDataURL("image/png");
    }
  </script>

  <script>
    const LOW_SRC = "images/76_.webp";
    const HIGH_SRC = "images/76.jpg";
    const imageContainer = document.querySelector(".image-container");
    const panoLow = new PANOLENS.ImagePanorama(LOW_SRC);
    const panoHigh = new PANOLENS.ImagePanorama(HIGH_SRC);

    const viewer = new PANOLENS.Viewer({ container: imageContainer, autoRotate: false, autoRotateSpeed: 0.1, controlBar: false, cameraFov: 80 });
    let didInitView = false;
    const TEXTURE_YAW = Math.PI / 2 + 33;
    panoLow.rotation.y = TEXTURE_YAW; panoHigh.rotation.y = TEXTURE_YAW;

    function setInitialViewAndLockPitch() {
      if (didInitView) return; didInitView = true;
      const controls = viewer.getControl(); controls.rotateUp(-(-Math.PI / 40));
      if ('minPolarAngle' in controls && 'maxPolarAngle' in controls) { controls.minPolarAngle = 0; controls.maxPolarAngle = Math.PI; }
      if ('enablePan' in controls) controls.enablePan = false;
    }

    panoLow.addEventListener('enter', setInitialViewAndLockPitch);
    panoHigh.addEventListener('enter', setInitialViewAndLockPitch);
    viewer.add(panoLow); viewer.add(panoHigh); viewer.setPanorama(panoLow);

    function degToRad(deg) { return deg * Math.PI / 180; }
    function setFromAngles(spot, yawDeg, pitchDeg, radius = 5000) {
      const yaw = degToRad(yawDeg), pitch = degToRad(pitchDeg);
      spot.position.set(radius * Math.cos(pitch) * Math.sin(yaw), radius * Math.sin(pitch), radius * Math.cos(pitch) * Math.cos(yaw));
    }

    const ARROW_ICON = createArrowSVG();
  
     
    
const spot2 = new PANOLENS.Infospot(550, ARROW_ICON);
    setFromAngles(spot2, -90, -4); spot2.addHoverText("75");
    spot2.addEventListener('click', () => { setTimeout(() => { window.location.href = "75.html"; }, 800); });

  [panoLow, panoHigh].forEach(pano => { pano.add(spot2); });

    panoLow.addEventListener("load", () => {
      panoHigh.addEventListener("load", () => { viewer.setPanorama(panoHigh, 600); });
      panoHigh.load();
    });
    panoHigh.addEventListener("error", (e) => { console.warn("Failed to load high-res:", e); });
  </script>

  <script>
    // 🧠 Remember which floor user came from
    (function rememberFloor() {
      const ref = document.referrer;
      const match = ref.match(/Floor_(\d+)\.html/);
      if (match) {
        sessionStorage.setItem('lastFloor', match[1]);
      }
    })();

    document.addEventListener("DOMContentLoaded", () => {
      // 🔙 Back button → go back to the remembered floor
      const closeCard = document.getElementById("closeCard");
      if (closeCard) {
        closeCard.addEventListener("click", () => {
          const floor = sessionStorage.getItem('lastFloor') || '1';
          window.location.href = `../../Floor_${floor}.html`;
        });
      }
    });
  </script>
