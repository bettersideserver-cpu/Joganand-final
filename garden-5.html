<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Yoganad — Premium Property Visualization</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Jost:wght@200;300;400;500&family=Cinzel:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="Subpages/garden-5/styles.css">

  <!--
    Tells the browser to start fetching the video
    immediately while the HTML is still parsing —
    before any JS runs.
  -->
  <link rel="preload" as="video" href="Subpages/garden-5/scrub.mp4" crossorigin>

  <style>
    /* ── Mobile portrait optimizations (does NOT affect desktop) ── */
    @media (max-width: 768px) and (orientation: portrait) {
      .env-bar        { bottom: 80px; min-width: 90vw; gap: 4px; }
      .env-slider-wrap{ width: 90vw; padding: 10px 16px; }
      .slider-ticks   { width: 90vw; }
      :root           { --tick-offset: 28px; }
      .section-display .sd-name { font-size: 22px; }
      .section-display .sd-meta { font-size: 9px; }
      .bottom-nav     { height: 64px; padding: 0 16px; }
      .nav-item       { padding: 0 12px; font-size: 9px; }
    }

    /* Safe-area insets for notched phones */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      @media (max-width: 768px) {
        .bottom-nav {
          padding-bottom: env(safe-area-inset-bottom);
          height: calc(68px + env(safe-area-inset-bottom));
        }
        .env-bar { bottom: calc(88px + env(safe-area-inset-bottom)); }
      }
    }

    /* Bigger touch target on coarse-pointer (mobile) only */
    @media (pointer: coarse) {
      input[type=range].env-range {
        touch-action: pan-x;
        height: 4px !important;        /* thicker track */
      }
      input[type=range].env-range::-webkit-slider-thumb {
        width: 36px !important;
        height: 36px !important;
      }
      input[type=range].env-range::-moz-range-thumb {
        width: 36px !important;
        height: 36px !important;
      }
      /* Expand the slider wrap for easier reach in landscape */
      .env-slider-wrap {
        padding: 14px 20px !important;
      }
    }

    /* iOS tap highlight suppression */
    @media (pointer: coarse) { * { -webkit-tap-highlight-color: transparent; } }

    /* iOS tap-to-start overlay (hidden by default) */
    #iosTapOverlay {
      display: none;
      position: fixed; inset: 0; z-index: 999998;
      background: #0a0907;
      flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    }
    #iosTapOverlay.show { display: flex; }
    #iosTapOverlay .tap-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px; font-weight: 300; letter-spacing: 0.08em;
      color: rgba(235,225,200,0.95);
    }
    #iosTapOverlay .tap-eyebrow {
      font-family: 'Cinzel', serif; font-size: 11px;
      letter-spacing: 0.35em; color: rgba(200,175,120,0.5);
      text-transform: uppercase;
    }
    #iosTapOverlay .tap-sub {
      font-family: 'Jost', sans-serif; font-size: 10px;
      letter-spacing: 0.18em; color: rgba(200,175,120,0.45);
      text-transform: uppercase;
    }
    #iosTapOverlay button {
      font-family: 'Jost', sans-serif;
      font-size: 12px; letter-spacing: 0.25em; text-transform: uppercase;
      color: oklch(75% 0.08 75);
      background: rgba(180,145,70,0.12);
      border: 1px solid rgba(200,175,120,0.4);
      border-radius: 30px; padding: 14px 32px;
      cursor: pointer; transition: all 0.2s;
    }
    #iosTapOverlay button:active { background: rgba(180,145,70,0.25); }
  </style>
</head>

<body>

  <div class="scene">
    <canvas id="bgCanvas" class="bg-canvas"></canvas>
  </div>

  <!-- Thin loading bar at top — non-blocking, stays out of the way -->
  <div id="loadBar" style="
    position:fixed;top:0;left:0;width:0%;height:2px;z-index:9999;
    background:linear-gradient(to right,rgba(200,175,120,0.4),rgba(200,175,120,1));
    transition:width 0.15s linear;pointer-events:none;
  "></div>

  <!-- FULL SCREEN LOADER — shows for 3 seconds then fades -->
  <div id="siteLoader" style="
    position:fixed;inset:0;z-index:99999;
    background:#0a0907;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
    transition:opacity 0.8s ease;
  ">
    <div style="font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.35em;color:rgba(200,175,120,0.5);text-transform:uppercase;margin-bottom:4px;">Estate Collection</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;color:rgba(235,225,200,0.95);letter-spacing:0.08em;">Joganand</div>
    <div style="width:180px;height:1px;background:rgba(200,175,120,0.12);border-radius:1px;overflow:hidden;margin-top:8px;">
      <div id="loaderFill" style="
        height:100%;width:0%;
        background:linear-gradient(to right,rgba(200,175,120,0.3),rgba(200,175,120,0.95));
        border-radius:1px;
        transition:width 0.05s linear;
      "></div>
    </div>
    <div id="loaderPct" style="font-family:'Jost',sans-serif;font-size:10px;letter-spacing:0.2em;color:rgba(200,175,120,0.35);margin-top:2px;">0%</div>
  </div>

  <!-- iOS tap-to-start overlay (only shown on iOS when autoplay is blocked) -->
  <div id="iosTapOverlay">
    <div class="tap-eyebrow">Estate Collection</div>
    <div class="tap-title">Joganand</div>
    <div class="tap-sub">Tap to load experience</div>
    <button id="iosTapBtn">Begin Experience</button>
  </div>

  <!-- BACK BUTTON -->
  <div class="back-btn" id="backBtn" title="Go Back"
    style="position:fixed;top:16px;left:16px;z-index:900;width:38px;height:38px;border-radius:50%;
           background:rgba(20,18,14,0.55);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
           border:1px solid rgba(200,175,120,0.25);display:flex;align-items:center;justify-content:center;
           cursor:pointer;color:oklch(82% 0.10 78);transition:background .25s,border-color .25s;">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="12 16 6 10 12 4" />
    </svg>
  </div>


  <!-- ENVIRONMENT CONTROL -->
  <div class="env-bar" id="envBar">
    <div class="section-display">
      <div class="sd-eyebrow"><span>Yoganad Estate</span></div>
      <div class="sd-name" id="sectionName">Point One</div>
      <div class="sd-meta" id="sectionMeta">Section 01 · Dummy Heading One</div>
    </div>

    <div class="slider-ticks" id="sliderTicks">
      <div class="slider-tick" data-zone="0" data-section="point1"
        style="left:calc(var(--tick-offset) + 0*(100% - 2*var(--tick-offset)))">
        <div class="slider-tick-label">Point One</div>
        <div class="slider-tick-line"></div>
      </div>
      <div class="slider-tick" data-zone="0.5" data-section="point2"
        style="left:calc(var(--tick-offset) + 0.5*(100% - 2*var(--tick-offset)))">
        <div class="slider-tick-label">Point Two</div>
        <div class="slider-tick-line"></div>
      </div>
      <div class="slider-tick" data-zone="1.0" data-section="point3"
        style="left:calc(var(--tick-offset) + 1.0*(100% - 2*var(--tick-offset)))">
        <div class="slider-tick-label">Point Three</div>
        <div class="slider-tick-line"></div>
      </div>
    </div>

    <div class="env-slider-wrap">
      <svg class="sun-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="10" cy="10" r="3.5" />
        <line x1="10" y1="2" x2="10" y2="4.5" />
        <line x1="10" y1="15.5" x2="10" y2="18" />
        <line x1="2" y1="10" x2="4.5" y2="10" />
        <line x1="15.5" y1="10" x2="18" y2="10" />
        <line x1="4.4" y1="4.4" x2="6.2" y2="6.2" />
        <line x1="13.8" y1="13.8" x2="15.6" y2="15.6" />
        <line x1="15.6" y1="4.4" x2="13.8" y2="6.2" />
        <line x1="6.2" y1="13.8" x2="4.4" y2="15.6" />
      </svg>
      <input type="range" class="env-range" id="envSlider" min="0" max="12" step="0.01" value="0">
      <svg class="moon-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M16 12.5A7 7 0 0 1 7.5 4a7 7 0 1 0 8.5 8.5z" />
      </svg>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav" id="bottomNav">
    <div class="nav-item active" id="nav-home">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3">
        <path d="M3 9.5L10 3l7 6.5V18H13v-4.5H7V18H3V9.5z" />
      </svg>
      Home
    </div>
  </div>

  <!-- UI TOGGLE BUTTON (mobile landscape) -->
  <button class="ui-toggle-btn" id="uiToggleBtn">⊞ Show Controls</button>

  <script>
    // ═══════════════════════════════════════════════════
    // CONFIG
    // ═══════════════════════════════════════════════════
    const VIDEO_SRC = 'Subpages/garden-5/scrub.mp4';

    // Detect mobile — used ONLY for mobile-specific optimisations.
    // Desktop code paths are completely unchanged from original.
    const IS_MOBILE = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    // Desktop: blend on (original behaviour). Mobile: blend off (saves GPU).
    const ENABLE_BLEND = !IS_MOBILE;

    const SECTION_META = {
      point1: { name: 'Point One',   meta: 'Section 01  ·  Dummy Heading One',   num: 1 },
      point2: { name: 'Point Two',   meta: 'Section 02  ·  Dummy Heading Two',   num: 2 },
      point3: { name: 'Point Three', meta: 'Section 03  ·  Dummy Heading Three', num: 3 },
    };

    // ═══════════════════════════════════════════════════
    // SLIDER VISUAL
    // ═══════════════════════════════════════════════════
    const slider = document.getElementById('envSlider');
    function refreshSliderVisual() {
      const pct = (parseFloat(slider.value) / 12) * 100;
      slider.style.background = `linear-gradient(to right,var(--gold) 0%,var(--gold) ${pct}%,rgba(200,175,120,0.2) ${pct}%,rgba(200,175,120,0.2) 100%)`;
      slider.style.setProperty('--pct', pct + '%');
    }
    refreshSliderVisual();
    slider.addEventListener('input', refreshSliderVisual);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) refreshSliderVisual(); });
    window.addEventListener('focus',    refreshSliderVisual);
    window.addEventListener('pageshow', refreshSliderVisual);

    // ═══════════════════════════════════════════════════
    // BACK BUTTON
    // ═══════════════════════════════════════════════════
    document.getElementById('backBtn').addEventListener('click', () => {
      if (document.referrer) window.history.back(); else window.location.href = '/';
    });

    // ═══════════════════════════════════════════════════
    // BOTTOM NAV
    // ═══════════════════════════════════════════════════
    document.getElementById('bottomNav').addEventListener('click', e => {
      const item = e.target.closest('.nav-item');
      if (!item) return;
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
    });

    // ═══════════════════════════════════════════════════
    // AUTO-HIDE UI (mobile landscape)
    // ═══════════════════════════════════════════════════
    const bottomNav   = document.getElementById('bottomNav');
    const uiToggleBtn = document.getElementById('uiToggleBtn');
    let uiHideTimer = null, uiVisible = true;
    const isMobileLandscape = () => window.innerHeight <= 500 && window.innerWidth > window.innerHeight;
    function hideUI() {
      if (!isMobileLandscape()) return;
      bottomNav.classList.add('ui-hidden');
      uiToggleBtn.textContent = '⊞ Show Controls';
      uiToggleBtn.style.opacity = '1';
      uiVisible = false;
    }
    function showUI() {
      bottomNav.classList.remove('ui-hidden');
      uiToggleBtn.textContent = '✕ Hide Controls';
      uiVisible = true;
      resetHideTimer();
    }
    function resetHideTimer() {
      clearTimeout(uiHideTimer);
      if (isMobileLandscape()) uiHideTimer = setTimeout(hideUI, 3000);
    }
    uiToggleBtn.addEventListener('click', e => { e.stopPropagation(); uiVisible ? hideUI() : showUI(); });
    document.addEventListener('pointerdown', e => {
      if (!isMobileLandscape()) return;
      if (e.target.closest('.bottom-nav,.ui-toggle-btn,.back-btn,.env-bar')) { resetHideTimer(); return; }
      uiVisible ? resetHideTimer() : showUI();
    });
    window.addEventListener('resize', () => {
      if (isMobileLandscape()) resetHideTimer();
      else { clearTimeout(uiHideTimer); bottomNav.classList.remove('ui-hidden'); uiVisible = true; }
    });
    if (isMobileLandscape()) resetHideTimer();

    // ═══════════════════════════════════════════════════
    // CANVAS
    // ═══════════════════════════════════════════════════
    const canvas  = document.getElementById('bgCanvas');
    const ctx     = canvas.getContext('2d');
    const loadBar = document.getElementById('loadBar');

    function resizeCanvas() {
      const dpr = Math.min(window.devicePixelRatio || 1, IS_MOBILE ? 1.5 : 2);
      canvas.width  = window.innerWidth  * dpr;
      canvas.height = window.innerHeight * dpr;
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ═══════════════════════════════════════════════════
    // FRAME STORE
    // ═══════════════════════════════════════════════════
    const frames = [];       // ImageBitmap[] (desktop) or HTMLCanvasElement[] (iOS)
    let totalFrames  = 0;
    let decodedCount = 0;
    let fullyReady   = false;

    // ═══════════════════════════════════════════════════
    // DRAW
    // ═══════════════════════════════════════════════════
    function drawBitmapCover(bmp, alpha) {
      const cw = canvas.width, ch = canvas.height;
      const bw = bmp.width  || bmp.videoWidth  || cw;
      const bh = bmp.height || bmp.videoHeight || ch;
      const scale = Math.max(cw / bw, ch / bh);
      const dw = bw * scale, dh = bh * scale;
      ctx.globalAlpha = alpha;
      ctx.drawImage(bmp, (cw - dw) / 2, (ch - dh) / 2, dw, dh);
    }

    function drawAt(floatIdx) {
      if (!frames.length) return;
      const available = frames.length - 1;
      const lo = Math.max(0, Math.min(available, Math.floor(floatIdx)));
      const hi = Math.min(available, lo + 1);
      const t  = floatIdx - lo;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (!ENABLE_BLEND || t === 0 || lo === hi) {
        drawBitmapCover(frames[lo], 1);
      } else {
        drawBitmapCover(frames[lo], 1);
        drawBitmapCover(frames[hi], t);
      }
      ctx.globalAlpha = 1;
    }

    // ═══════════════════════════════════════════════════
    // VIDEO DECODE
    //
    // DESKTOP (unchanged from original):
    //   • requestVideoFrameCallback path  → Chrome/Edge/Safari desktop
    //   • seek-based + createImageBitmap  → Firefox desktop
    //
    // MOBILE (new — only runs on iOS/Android):
    //   • iOS Safari blocks vid.play() without gesture → show tap overlay
    //   • After tap, seek-based decode with canvas-snapshot fallback
    //     (because createImageBitmap(video) is unreliable on iOS)
    // ═══════════════════════════════════════════════════
    const vid = document.createElement('video');
    vid.src         = VIDEO_SRC;
    vid.muted       = true;
    vid.playsInline = true;
    vid.setAttribute('playsinline', '');
    vid.setAttribute('webkit-playsinline', '');
    vid.preload     = 'auto';
    vid.style.cssText = 'position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;';
    document.body.appendChild(vid);

    vid.addEventListener('error', () => {
      loadBar.style.background = 'red';
      loadBar.style.width = '100%';
      console.error('Video failed to load:', VIDEO_SRC);
    });

    function onFrameDecoded(bmp, progressFraction) {
      frames.push(bmp);
      decodedCount++;

      // Show canvas the moment first frame lands
      if (decodedCount === 1) {
        canvas.classList.add('ready');
        drawAt(0);
      }

      // Update thin top bar
      loadBar.style.width = Math.round(progressFraction * 100) + '%';

      // Done
      if (progressFraction >= 1) onAllDecoded();
    }

    function onAllDecoded() {
      fullyReady  = true;
      totalFrames = frames.length;
      decodeDone  = true;

      // Clean up video element
      vid.pause(); vid.src = ''; vid.remove();

      // Hide top load bar
      loadBar.style.opacity = '0';
      setTimeout(() => loadBar.remove(), 600);

      // Sync scrub position
      displayedFloat = sliderToFrameFloat();
      targetFloat    = displayedFloat;

      // Try hide loader (only hides if 3s also passed)
      tryHideLoader();

      console.log('✅ All', totalFrames, 'frames decoded.');
    }

    // ── captureFrame: ImageBitmap on desktop, canvas snapshot on iOS ──
    const _offscreen    = document.createElement('canvas');
    const _offscreenCtx = _offscreen.getContext('2d');

    function captureFrame(video) {
      return new Promise(resolve => {
        if (!IS_MOBILE && typeof createImageBitmap === 'function') {
          // Desktop: fast off-main-thread path
          createImageBitmap(video).then(resolve).catch(() => resolve(_canvasSnap(video)));
        } else {
          // Mobile: draw to canvas (works everywhere including iOS)
          resolve(_canvasSnap(video));
        }
      });
    }

    function _canvasSnap(video) {
      const w = video.videoWidth  || 1280;
      const h = video.videoHeight || 720;
      const scale = IS_MOBILE ? 0.5 : 1; // halve res on mobile to save memory
      _offscreen.width  = Math.round(w * scale);
      _offscreen.height = Math.round(h * scale);
      _offscreenCtx.drawImage(video, 0, 0, _offscreen.width, _offscreen.height);
      const snap = document.createElement('canvas');
      snap.width  = _offscreen.width;
      snap.height = _offscreen.height;
      snap.getContext('2d').drawImage(_offscreen, 0, 0);
      return snap;
    }

    // ────────────────────────────────────────────────────
    // DESKTOP PATH  (identical to original, untouched)
    // ────────────────────────────────────────────────────
    if (!IS_MOBILE) {

      if ('requestVideoFrameCallback' in HTMLVideoElement.prototype) {
        // ── requestVideoFrameCallback path (preferred) ──────
        vid.addEventListener('loadedmetadata', () => {
          const duration = vid.duration;

          function capture() {
            createImageBitmap(vid).then(bmp => {
              const progress = Math.min(vid.currentTime / duration, 1);
              onFrameDecoded(bmp, progress);
              if (!vid.ended && vid.currentTime < duration - 0.01) {
                vid.requestVideoFrameCallback(capture);
              } else {
                // grab the last frame too
                createImageBitmap(vid).then(b => onFrameDecoded(b, 1));
              }
            });
          }

          vid.requestVideoFrameCallback(capture);
          vid.play();
        });

      } else {
        // ── Seek-based fallback (desktop Firefox) ───────────
        const TARGET_FPS = 30;
        let duration = 0, frameCount = 0, idx = 0;

        vid.addEventListener('loadedmetadata', () => {
          duration   = vid.duration;
          frameCount = Math.ceil(duration * TARGET_FPS);
          vid.currentTime = 0;
        });

        vid.addEventListener('seeked', () => {
          createImageBitmap(vid).then(bmp => {
            onFrameDecoded(bmp, idx / (frameCount - 1));
            idx++;
            if (idx < frameCount) {
              vid.currentTime = (idx / (frameCount - 1)) * duration;
            }
          });
        });
      }

      // Kick off load immediately
      vid.load();

    // ────────────────────────────────────────────────────
    // MOBILE PATH  (new — only runs on iOS/Android)
    // ────────────────────────────────────────────────────
    } else {

      const iosTapOverlay = document.getElementById('iosTapOverlay');
      const iosTapBtn     = document.getElementById('iosTapBtn');

      function runMobileDecode() {
        // vid.load() is NOT called here — caller is responsible for loading
        // before invoking this function (avoids double-load reset)
        function doDecodeAfterMeta() {
          const duration   = vid.duration;
          const TARGET_FPS = 15; // fewer frames → less memory on mobile
          const frameCount = Math.max(2, Math.ceil(duration * TARGET_FPS));
          let idx = 0;

          function seekNext() {
            if (idx >= frameCount) return;
            // iOS won't fire 'seeked' if currentTime is already 0 (video just loaded).
            // Use a tiny non-zero offset for the first frame so the seek is real.
            const t = idx === 0
              ? 0.001
              : (idx / (frameCount - 1)) * duration;
            vid.currentTime = t;
          }

          vid.addEventListener('seeked', function onSeeked() {
            captureFrame(vid).then(frame => {
              // Always report progress as if we're at the correct logical position
              onFrameDecoded(frame, idx / (frameCount - 1));
              idx++;
              if (idx < frameCount) {
                setTimeout(seekNext, 20); // small gap prevents iOS seek-choke
              } else {
                vid.removeEventListener('seeked', onSeeked);
              }
            });
          });

          seekNext();
        }

        // If metadata already loaded (e.g. after autoplay), run immediately
        if (vid.readyState >= 1) {
          doDecodeAfterMeta();
        } else {
          vid.addEventListener('loadedmetadata', doDecodeAfterMeta, { once: true });
        }
      }

      // Try autoplay first (works on Android Chrome)
      // If blocked (iOS Safari), show the tap overlay instead
      vid.load();
      const testPlay = vid.play();
      if (testPlay !== undefined) {
        testPlay
          .then(() => {
            // Autoplay allowed (Android Chrome) — pause & do seek decode
            vid.pause();
            vid.currentTime = 0;
            runMobileDecode();
          })
          .catch(() => {
            // Blocked (iOS Safari) — hide loader, show tap overlay
            const loaderEl = document.getElementById('siteLoader');
            if (loaderEl) {
              loaderEl.style.opacity = '0';
              loaderEl.style.pointerEvents = 'none';
            }
            iosTapOverlay.classList.add('show');
          });
      } else {
        // No Promise returned (very old browser) — just run decode
        vid.pause();
        runMobileDecode();
      }

      iosTapBtn.addEventListener('click', () => {
        iosTapOverlay.classList.remove('show');
        // Bring loader back while decoding
        const loaderEl = document.getElementById('siteLoader');
        if (loaderEl) {
          loaderEl.style.opacity = '1';
          loaderEl.style.pointerEvents = 'auto';
        }
        runMobileDecode();
      });
    }

    // ═══════════════════════════════════════════════════
    // LOADER — 3 sec minimum + decoding progress
    // Both the 3s timer AND decoding must finish before
    // the loader hides. Whichever takes longer wins.
    // ═══════════════════════════════════════════════════
    const loaderEl   = document.getElementById('siteLoader');
    const loaderFill = document.getElementById('loaderFill');
    const loaderPct  = document.getElementById('loaderPct');

    let timerDone   = false;
    let decodeDone  = false;

    // Animate progress bar smoothly over 3 seconds
    const LOADER_MS  = 3000;
    const loaderStart = performance.now();

    function tickLoader() {
      const elapsed  = performance.now() - loaderStart;
      const timePct  = Math.min(elapsed / LOADER_MS, 1);
      // blend time progress + decode progress so bar feels alive
      const decodePct = frames.length && totalFrames
        ? frames.length / totalFrames
        : decodedCount / Math.max(decodedCount + 1, 1);
      const combined = Math.max(timePct, decodePct * 0.95); // decode drives up to 95%
      loaderFill.style.width = Math.round(combined * 100) + '%';
      loaderPct.textContent  = Math.round(combined * 100) + '%';
      if (timePct < 1) requestAnimationFrame(tickLoader);
    }
    requestAnimationFrame(tickLoader);

    // 3s timer
    setTimeout(() => {
      timerDone = true;
      tryHideLoader();
    }, LOADER_MS);

    // Called by onAllDecoded too
    function tryHideLoader() {
      if (!timerDone) return; // wait for 3s minimum
      loaderFill.style.width = '100%';
      loaderPct.textContent  = '100%';
      setTimeout(() => {
        if (loaderEl && loaderEl.parentNode) {
          loaderEl.style.opacity = '0';
          loaderEl.style.pointerEvents = 'none';
          setTimeout(() => { if (loaderEl && loaderEl.parentNode) loaderEl.remove(); }, 800);
        }
      }, 200);
    }

    // ═══════════════════════════════════════════════════
    // SCRUB PHYSICS (identical to original frame system)
    // ═══════════════════════════════════════════════════
    function sliderToFrameFloat() {
      const count = frames.length;
      if (!count) return 0;
      return (parseFloat(slider.value) / parseFloat(slider.max)) * (count - 1);
    }

    let targetFloat    = 0;
    let displayedFloat = 0;
    let velocity       = 0;
    let isDragging     = false;
    let lastSampleTime = 0;
    let lastSampleVal  = 0;
    let lastTickTime   = performance.now();
    const FRICTION       = 0.92;
    const DRAG_LERP      = 0.001;
    const VELOCITY_EMA   = 0.55;

    slider.addEventListener('pointerdown', () => {
      isDragging = true; velocity = 0;
      lastSampleTime = performance.now();
      lastSampleVal  = sliderToFrameFloat();
    });
    const endDrag = () => { isDragging = false; };
    slider.addEventListener('pointerup',          endDrag);
    slider.addEventListener('pointercancel',      endDrag);
    slider.addEventListener('lostpointercapture', endDrag);

    // Touch fallback for iOS slider drag
    if (IS_MOBILE) {
      slider.addEventListener('touchstart', () => {
        isDragging = true; velocity = 0;
        lastSampleTime = performance.now();
        lastSampleVal  = sliderToFrameFloat();
      }, { passive: true });
      slider.addEventListener('touchend', () => { isDragging = false; });
    }

    slider.addEventListener('input', () => {
      refreshSliderVisual();
      updateSectionDisplay();
      if (!frames.length) return;
      const now      = performance.now();
      const newFloat = sliderToFrameFloat();
      if (isDragging) {
        if (lastSampleTime > 0) {
          const dt = Math.max(1, now - lastSampleTime);
          velocity = velocity * (1 - VELOCITY_EMA) + ((newFloat - lastSampleVal) / dt) * VELOCITY_EMA;
        }
        lastSampleTime = now; lastSampleVal = newFloat; targetFloat = newFloat;
      } else {
        velocity = 0; targetFloat = newFloat; displayedFloat = newFloat;
      }
    });

    let zoneSnapAnim = null;

    function tick() {
      const now = performance.now();
      const dt  = Math.min(50, now - lastTickTime);
      lastTickTime = now;

      if (frames.length) {
        const maxF = frames.length - 1;
        if (isDragging) {
          const k = 1 - Math.pow(DRAG_LERP, dt / 16);
          displayedFloat += (targetFloat - displayedFloat) * k;
        } else if (Math.abs(velocity) > 0.00005 || Math.abs(displayedFloat - targetFloat) > 0.01) {
          displayedFloat += velocity * dt;
          velocity       *= Math.pow(FRICTION, dt / 16);
          displayedFloat += (targetFloat - displayedFloat) * (1 - Math.pow(0.85, dt / 16));
          displayedFloat  = Math.max(0, Math.min(maxF, displayedFloat));
          if (displayedFloat <= 0 || displayedFloat >= maxF) velocity = 0;
        } else {
          displayedFloat += (targetFloat - displayedFloat) * (1 - Math.pow(0.001, dt / 16));
        }
        drawAt(displayedFloat);
      }

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // ═══════════════════════════════════════════════════
    // SECTION ZONES
    // ═══════════════════════════════════════════════════
    const SECTION_KEYS  = ['point1', 'point2', 'point3'];
    const TICK_POSITIONS = [0, 0.5, 1.0];

    function getCurrentZone() {
      const val = parseFloat(slider.value);
      const min = parseFloat(slider.min);
      const max = parseFloat(slider.max);
      let pct = Math.max(0, Math.min(1, (val - min) / (max - min)));
      let ci = 0, cd = Math.abs(pct - TICK_POSITIONS[0]);
      for (let i = 1; i < TICK_POSITIONS.length; i++) {
        const d = Math.abs(pct - TICK_POSITIONS[i]);
        if (d < cd) { cd = d; ci = i; }
      }
      return { zone: ci, pct, key: SECTION_KEYS[ci] };
    }

    const sectionNameEl = document.getElementById('sectionName');
    const sectionMetaEl = document.getElementById('sectionMeta');
    let lastSectionKey  = null;

    function updateSectionDisplay() {
      const { key } = getCurrentZone();
      if (key === lastSectionKey) return;
      lastSectionKey = key;
      const meta = SECTION_META[key];
      if (!meta) return;
      sectionNameEl.classList.add('morphing');
      setTimeout(() => {
        sectionNameEl.textContent = meta.name;
        sectionMetaEl.textContent = meta.meta;
        sectionNameEl.classList.remove('morphing');
        document.querySelectorAll('.slider-tick').forEach(t => t.classList.remove('active'));
        const at = document.querySelector(`.slider-tick[data-section="${key}"]`);
        if (at) at.classList.add('active');
      }, 120);
    }
    updateSectionDisplay();

    // ═══════════════════════════════════════════════════
    // TICK CLICK — snap to section
    // ═══════════════════════════════════════════════════
    document.getElementById('sliderTicks').addEventListener('click', e => {
      const tick = e.target.closest('.slider-tick[data-zone]');
      if (!tick) return;
      e.stopPropagation();
      const targetPct = parseFloat(tick.dataset.zone);
      const min = parseFloat(slider.min), max = parseFloat(slider.max);
      const endVal   = min + targetPct * (max - min);
      const startVal = parseFloat(slider.value);
      if (Math.abs(startVal - endVal) < 0.01) return;
      if (zoneSnapAnim) { cancelAnimationFrame(zoneSnapAnim); zoneSnapAnim = null; }
      const dur = 900, t0 = performance.now();
      const ease = t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
      function animateTick(now) {
        const t = Math.min(1, (now - t0) / dur);
        slider.value = startVal + (endVal - startVal) * ease(t);
        refreshSliderVisual();
        velocity = 0; targetFloat = sliderToFrameFloat();
        if (t < 1) {
          zoneSnapAnim = requestAnimationFrame(animateTick);
        } else {
          slider.value = endVal; refreshSliderVisual();
          targetFloat = displayedFloat = sliderToFrameFloat();
          velocity = 0; zoneSnapAnim = null;
        }
      }
      zoneSnapAnim = requestAnimationFrame(animateTick);
    });

  </script>
</body>
</html>
