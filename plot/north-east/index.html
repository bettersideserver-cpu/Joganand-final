<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Yoganad — Premium Property Visualization</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Jost:wght@200;300;400;500&family=Cinzel:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: oklch(82% 0.13 78);
      --gold-dim: oklch(68% 0.10 78);
      --gold-bright: oklch(90% 0.11 78);
      --dark: #0a0a08;
      --dark-glass: rgba(12, 11, 8, 0.82);
      --dark-glass-light: rgba(16, 14, 10, 0.72);
      --gold-border: rgba(200, 175, 120, 0.25);
      --gold-border-hover: rgba(200, 175, 120, 0.45);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: 'Jost', sans-serif;
      color: var(--gold);
    }

    .bg-div {
      position: fixed;
      inset: 0;
      background-image: url('background.png');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    .back-btn {
      position: fixed;
      top: 16px; left: 16px;
      z-index: 900;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--dark-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--gold-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--gold);
      transition: background .25s, border-color .25s;
    }
    .back-btn:hover {
      background: rgba(200, 175, 120, 0.18);
      border-color: var(--gold-border-hover);
    }

    .brand {
      position: fixed;
      top: 18px; right: 20px;
      z-index: 900;
      font-family: 'Cinzel', serif;
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--gold);
      text-transform: uppercase;
      opacity: 0.85;
    }

    .svg-overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
    }

    .plot-shape {
      fill: rgba(160, 130, 70, 0.15);
      stroke: rgba(160, 130, 70, 0.60);
      stroke-width: 1.5;
      cursor: pointer;
      transition: fill 0.35s ease, stroke 0.35s ease, stroke-width 0.25s ease, filter 0.35s ease;
      filter: drop-shadow(0 0 0px transparent);
    }
    .plot-shape:hover,
    .plot-shape.active {
      fill: rgba(255, 173, 9, 0.879);
      stroke: oklch(59.498% 0.07449 83.667);
      stroke-width: 2.2;
      filter: drop-shadow(0 0 14px rgba(140, 110, 50, 0.65));
    }

    .tooltip {
      position: fixed;
      z-index: 950;
      pointer-events: none;
      padding: 6px 14px;
      border-radius: 6px;
      background: var(--dark-glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--gold-border);
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--gold-bright);
      white-space: nowrap;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .side-panel {
      position: fixed;
      top: 0; right: 0;
      width: 340px;
      max-width: 85vw;
      height: 100%;
      z-index: 800;
      background: var(--dark-glass);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-left: 1px solid var(--gold-border);
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .side-panel.open { transform: translateX(0); }

    /* ── Left-side panel variant (plot is on right half of screen) ── */
    .side-panel.panel-left {
      right: auto;
      left: 0;
      border-left: none;
      border-right: 1px solid var(--gold-border);
      transform: translateX(-100%);
    }
    .side-panel.panel-left.open { transform: translateX(0); }

    .panel-header {
      padding: 32px 28px 20px;
      border-bottom: 1px solid rgba(200, 175, 120, 0.12);
    }
    .panel-eyebrow {
      font-family: 'Jost', sans-serif;
      font-size: 10px; font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 6px;
    }
    .panel-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 500;
      color: var(--gold-bright);
      letter-spacing: 0.02em;
    }

    .panel-body { padding: 24px 28px; flex: 1; }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgba(200, 175, 120, 0.08);
    }
    .info-row:last-child { border-bottom: none; }

    .info-label {
      font-size: 12px; font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold-dim);
      display: flex; align-items: center; gap: 8px;
    }
    .info-label svg {
      width: 16px; height: 16px;
      stroke: var(--gold-dim);
      fill: none; stroke-width: 1.5;
      flex-shrink: 0;
    }

    .info-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; font-weight: 500;
      color: var(--gold-bright);
      letter-spacing: 0.02em;
      text-align: right;
    }

    .panel-divider {
      width: 40px; height: 1px;
      background: linear-gradient(90deg, var(--gold-border), transparent);
      margin: 8px 0 16px;
    }

    .panel-note {
      font-size: 12px; font-weight: 300;
      line-height: 1.7;
      color: rgba(200, 175, 120, 0.45);
      letter-spacing: 0.02em;
      margin-top: 12px;
    }

    /* ── Close button inside panel ─────────────────────────── */
    .panel-close {
      position: absolute;
      top: 14px; right: 16px;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid var(--gold-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--gold-dim);
      transition: background .2s, border-color .2s;
    }
    .panel-close:hover { background: rgba(200,175,120,.12); border-color: var(--gold-border-hover); }

    /* ── Zoom / pan wrapper for SVG ─────────────────────────── */
    .map-wrapper {
      position: fixed;
      inset: 0;
      z-index: 100;
      overflow: hidden;
      touch-action: none;
    }
    .map-wrapper .svg-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform-origin: 0 0;
      will-change: transform;
    }

    /* ── Mobile bottom-sheet panel ──────────────────────────── */
    @media (max-width: 640px) {
      .brand { font-size: 11px; letter-spacing: 0.12em; right: 12px; top: 14px; }

      .side-panel {
        top: auto;
        bottom: 0; right: 0; left: 0;
        width: 100%; max-width: 100%;
        height: auto;
        max-height: 65vh;
        border-left: none;
        border-top: 1px solid var(--gold-border);
        border-radius: 18px 18px 0 0;
        transform: translateY(100%);
        transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .side-panel.open { transform: translateY(0); }
      /* On mobile the panel is always bottom-sheet — ignore left/right positioning */
      .side-panel.panel-left {
        right: 0; left: 0;
        border-right: none;
        border-top: 1px solid var(--gold-border);
        transform: translateY(100%);
      }
      .side-panel.panel-left.open { transform: translateY(0); }

      .panel-header { padding: 22px 20px 16px; }
      .panel-body { padding: 16px 20px 28px; }

      /* Drag handle */
      .panel-header::before {
        content: '';
        display: block;
        width: 36px; height: 4px;
        border-radius: 2px;
        background: var(--gold-border-hover);
        margin: 0 auto 14px;
      }

      .panel-close { display: flex; }

      .mobile-hint {
        position: fixed;
        bottom: 20px; left: 50%;
        transform: translateX(-50%);
        z-index: 200;
        font-family: 'Jost', sans-serif;
        font-size: 12px; font-weight: 300;
        letter-spacing: 0.10em;
        color: rgba(200, 175, 120, 0.55);
        background: var(--dark-glass);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--gold-border);
        padding: 6px 16px;
        border-radius: 20px;
        white-space: nowrap;
        pointer-events: none;
        transition: opacity 0.6s ease;
      }
      .mobile-hint.hidden { opacity: 0; }
    }

    @media (min-width: 641px) {
      .side-panel { width: 340px; max-width: 85vw; }
      .panel-close { display: none; }
      .mobile-hint { display: none; }
    }

    /* ── Landscape mobile: compact floating box, no scroll ───────── */
    @media (max-height: 500px) and (orientation: landscape) {
      .side-panel {
        /* Reset bottom-sheet / full-height styles */
        top: 50%;
        bottom: auto;
        right: 16px;
        left: auto;
        width: auto;
        min-width: 260px;
        max-width: 42vw;
        height: auto;
        max-height: calc(100vh - 32px);
        border-radius: 14px;
        border: 1px solid var(--gold-border);
        border-left: 1px solid var(--gold-border);
        border-top: 1px solid var(--gold-border);
        transform: translateY(-50%) translateX(calc(100% + 20px));
        transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.35s ease;
        opacity: 0;
        overflow: hidden;
      }
      .side-panel.open {
        transform: translateY(-50%) translateX(0);
        opacity: 1;
      }
      /* Left variant in landscape */
      .side-panel.panel-left {
        right: auto;
        left: 16px;
        border-right: 1px solid var(--gold-border);
        transform: translateY(-50%) translateX(calc(-100% - 20px));
      }
      .side-panel.panel-left.open {
        transform: translateY(-50%) translateX(0);
        opacity: 1;
      }

      .panel-header {
        padding: 14px 16px 10px;
        position: relative;
      }
      .panel-eyebrow { font-size: 9px; margin-bottom: 2px; }
      .panel-title { font-size: 18px; }
      .panel-close { display: flex; top: 10px; right: 10px; width: 26px; height: 26px; }

      .panel-body {
        padding: 8px 16px 14px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0 12px;
        overflow: hidden;
      }

      .info-row {
        padding: 7px 0;
        border-bottom: 1px solid rgba(200, 175, 120, 0.08);
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
      }
      .info-row:last-child { border-bottom: none; }
      .info-label { font-size: 9px; }
      .info-label svg { width: 12px; height: 12px; }
      .info-value { font-size: 14px; text-align: left; }

      .panel-divider { display: none; }
      .panel-note { display: none; }
      .mobile-hint { display: none; }
    }

    .plot-shape.tapped {
      fill: rgba(160, 130, 70, 0.50);
      stroke: oklch(58% 0.13 78);
      stroke-width: 2.2;
      filter: drop-shadow(0 0 14px rgba(140, 110, 50, 0.65));
    }
  </style>
</head>

    /* ── DOM refs ── */
    const tooltip    = document.getElementById('tooltip');
    const sidePanel  = document.getElementById('sidePanel');
    const panelTitle    = document.getElementById('panelTitle');
    const infoPlotSize  = document.getElementById('infoPlotSize');
    const infoParkSide  = document.getElementById('infoParkSide');
    const infoFront     = document.getElementById('infoFront');
    const infoLength    = document.getElementById('infoLength');
    const infoDirection = document.getElementById('infoDirection');
    const panelClose = document.getElementById('panelClose');
    const mapWrapper = document.getElementById('mapWrapper');
    const svgMap     = document.getElementById('svgMap');
    const mobileHint = document.getElementById('mobileHint');
    const backBtn    = document.getElementById('backBtn');

    /* ── Panel open/close ── */
    function openPanel(plotId, clientX) {
      const d = PLOT_DATA[plotId] || {};
      panelTitle.textContent    = d.name      || plotId;
      infoPlotSize.textContent  = d.plotSize  || '—';
      infoParkSide.textContent  = d.parkSide  || '—';
      infoFront.textContent     = d.front     || '—';
      infoLength.textContent    = d.length    || '—';
      infoDirection.textContent = d.direction || '—';
      /* Slide from left if plot is on right half of screen */
      const onRight = clientX != null ? clientX > window.innerWidth / 2 : false;
      sidePanel.classList.toggle('panel-left', onRight);
      sidePanel.classList.add('open');
    }
    function closePanel() {
      sidePanel.classList.remove('open');
    }

    /* ── Hint dismiss ── */
    function dismissHint() {
      if (mobileHint) mobileHint.classList.add('hidden');
    }

    /* ── Close button ── */
    if (panelClose) panelClose.addEventListener('click', closePanel);

    /* ── Tap on map background closes panel ── */
    mapWrapper.addEventListener('click', e => {
      if (e.target === mapWrapper || e.target === svgMap) closePanel();
    });

    /* ── Back button ── */
    backBtn.addEventListener('click', () => window.history.back());

    /* ── Pinch-zoom & pan state ── */
    let scale = 1, tX = 0, tY = 0;
    let lastDist = 0, lastMidX = 0, lastMidY = 0;
    let isDragging = false, dragStartX = 0, dragStartY = 0, dragStartTX = 0, dragStartTY = 0;
    let activeTouches = [];
    const MIN_SCALE = 1, MAX_SCALE = 8;

    function applyTransform() {
      svgMap.style.transform = `translate(${tX}px,${tY}px) scale(${scale})`;
    }

    function clampTranslate() {
      const wRect = mapWrapper.getBoundingClientRect();
      const maxTX = 0;
      const minTX = wRect.width  - wRect.width  * scale;
      const maxTY = 0;
      const minTY = wRect.height - wRect.height * scale;
      tX = Math.min(maxTX, Math.max(minTX, tX));
      tY = Math.min(maxTY, Math.max(minTY, tY));
    }

    function getTouchDist(t1, t2) {
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx*dx + dy*dy);
    }

    /* ── Touch events on wrapper ── */
    mapWrapper.addEventListener('touchstart', e => {
      activeTouches = Array.from(e.touches);
      if (activeTouches.length === 2) {
        lastDist = getTouchDist(activeTouches[0], activeTouches[1]);
        lastMidX = (activeTouches[0].clientX + activeTouches[1].clientX) / 2;
        lastMidY = (activeTouches[0].clientY + activeTouches[1].clientY) / 2;
        isDragging = false;
      } else if (activeTouches.length === 1) {
        dragStartX = activeTouches[0].clientX;
        dragStartY = activeTouches[0].clientY;
        dragStartTX = tX;
        dragStartTY = tY;
        isDragging = true;
      }
    }, { passive: true });

    mapWrapper.addEventListener('touchmove', e => {
      activeTouches = Array.from(e.touches);
      if (activeTouches.length === 2) {
        e.preventDefault();
        const newDist = getTouchDist(activeTouches[0], activeTouches[1]);
        const newMidX = (activeTouches[0].clientX + activeTouches[1].clientX) / 2;
        const newMidY = (activeTouches[0].clientY + activeTouches[1].clientY) / 2;
        const wRect = mapWrapper.getBoundingClientRect();

        const ratio = newDist / lastDist;
        const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * ratio));

        // pivot at midpoint
        const originX = lastMidX - wRect.left;
        const originY = lastMidY - wRect.top;
        tX = newMidX - wRect.left - (originX - tX) * (newScale / scale) - (newMidX - lastMidX);
        tY = newMidY - wRect.top  - (originY - tY) * (newScale / scale) - (newMidY - lastMidY);

        scale = newScale;
        lastDist = newDist;
        lastMidX = newMidX;
        lastMidY = newMidY;
        clampTranslate();
        applyTransform();
        isDragging = false;
      } else if (activeTouches.length === 1 && isDragging) {
        if (scale > 1) {
          e.preventDefault();
          const dx = activeTouches[0].clientX - dragStartX;
          const dy = activeTouches[0].clientY - dragStartY;
          tX = dragStartTX + dx;
          tY = dragStartTY + dy;
          clampTranslate();
          applyTransform();
        }
      }
    }, { passive: false });

    mapWrapper.addEventListener('touchend', () => {
      if (Array.from(event.touches).length < 2) isDragging = false;
    }, { passive: true });

    /* ── Plot interaction ── */
    let lastTappedPlot = null;

    document.querySelectorAll('.plot-shape').forEach(shape => {
      const plotId = shape.dataset.plot;

      /* Desktop: hover tooltip + panel */
      shape.addEventListener('mouseenter', e => {
        const d = PLOT_DATA[plotId];
        tooltip.textContent = d ? d.name : plotId;
        tooltip.classList.add('visible');
        shape.classList.add('active');
        openPanel(plotId, e.clientX);
      });
      shape.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top  = (e.clientY - 28) + 'px';
      });
      shape.addEventListener('mouseleave', () => {
        tooltip.classList.remove('visible');
        shape.classList.remove('active');
        closePanel();
      });

      /* Mobile: tap to open panel */
      shape.addEventListener('touchstart', e => {
        // mark this touch start time/position for tap detection
        shape._tapStartX = e.touches[0].clientX;
        shape._tapStartY = e.touches[0].clientY;
        shape._tapStartTime = Date.now();
      }, { passive: true });

      shape.addEventListener('touchend', e => {
        const dx = Math.abs(e.changedTouches[0].clientX - shape._tapStartX);
        const dy = Math.abs(e.changedTouches[0].clientY - shape._tapStartY);
        const dt = Date.now() - shape._tapStartTime;
        // only treat as tap if minimal movement and quick
        if (dx < 10 && dy < 10 && dt < 500) {
          e.preventDefault();
          e.stopPropagation();
          if (lastTappedPlot && lastTappedPlot !== shape) {
            lastTappedPlot.classList.remove('tapped');
          }
          shape.classList.add('tapped');
          lastTappedPlot = shape;
          openPanel(plotId, e.changedTouches[0].clientX);
          dismissHint();
          /* Show tooltip briefly on tap */
          const d = PLOT_DATA[plotId];
          tooltip.textContent = d ? d.name : plotId;
          const tx = e.changedTouches[0].clientX;
          const ty = e.changedTouches[0].clientY;
          tooltip.style.left = (tx + 14) + 'px';
          tooltip.style.top  = (ty - 40) + 'px';
          tooltip.classList.add('visible');
          clearTimeout(tooltip._hideTimer);
          tooltip._hideTimer = setTimeout(() => tooltip.classList.remove('visible'), 2000);
        }
      }, { passive: false });
    });
  </script>


  <div class="mobile-hint" id="mobileHint">Tap a plot &middot; Pinch to zoom</div>
</body>
</html>
